<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPS WebGL Game</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; user-select: none; }
        #ui-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; transform: translate(-50%, -50%); pointer-events: none; }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: rgba(255, 255, 255, 0.8); }
        #crosshair::before { top: 9px; left: 0; width: 20px; height: 2px; }
        #crosshair::after { top: 0; left: 9px; width: 2px; height: 20px; }
        body.sprinting #crosshair { transform: translate(-50%, -50%) scale(1.5); transition: transform 0.2s; }
        
        #health-bar { position: absolute; bottom: 30px; left: 30px; width: 300px; height: 20px; background: rgba(0,0,0,0.5); border: 2px solid #fff; }
        #health-fill { width: 100%; height: 100%; background: #ff2222; transition: width 0.2s; }
        #stamina-bar { position: absolute; bottom: 60px; left: 30px; width: 200px; height: 10px; background: rgba(0,0,0,0.5); border: 1px solid #fff; }
        #stamina-fill { width: 100%; height: 100%; background: #22aaff; }
        
        #wave-info { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); font-size: 24px; color: white; font-weight: bold; text-shadow: 2px 2px 4px #000; }
        #instructions { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; pointer-events: auto; cursor: pointer; }
        #instructions h1 { font-size: 48px; margin-bottom: 20px; color: #ff0055; text-shadow: 0 0 10px #ff0055; }
        #instructions p { font-size: 18px; margin: 10px 0; text-align: center; }
        
        #damage-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; box-shadow: inset 0 0 0 rgba(255,0,0,0); transition: box-shadow 0.1s; z-index: 5; }
        
        /* 版本标识样式 */
        #version-info {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: rgba(255, 255, 255, 0.4);
            font-family: monospace;
            font-size: 14px;
            z-index: 100;
            pointer-events: none;
        }
    </style>
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "cannon-es": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"
            }
        }
    </script>
</head>
<body>
    <div id="ui-container">
        <div id="crosshair"></div>
        <div id="health-bar"><div id="health-fill"></div></div>
        <div id="stamina-bar"><div id="stamina-fill"></div></div>
        <div id="wave-info">LOADING...</div>
        <div id="damage-overlay"></div>
        
        <div id="version-info">Build: v1.1.0 (弹道与伤害修正版)</div>
    </div>
    
    <div id="instructions">
        <h1>NEON PURGE</h1>
        <p>CLICK TO START / RESUME</p>
        <p>WASD to Move | SPACE to Jump | SHIFT to Sprint | LEFT CLICK to Shoot | R to Reload</p>
    </div>
    
    <script type="module" src="src/main.js?v=1.1.0"></script>
</body>
</html>
