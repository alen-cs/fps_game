<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>极简工业风 FPS - 终极修复版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; font-family: sans-serif; }
        /* 准星 */
        #crosshair {
            position: fixed; top: 50%; left: 50%;
            width: 14px; height: 14px; border: 2px solid #0f0;
            border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none; z-index: 10;
        }
        /* 启动层 */
        #instructions {
            position: absolute; inset: 0; display: flex; 
            justify-content: center; align-items: center;
            background: rgba(0,0,0,0.85); color: white;
            cursor: pointer; z-index: 20; text-align: center;
        }
        .ui-hint { border: 2px solid #555; padding: 30px; border-radius: 10px; }
        /* 移动端辅助按钮 */
        #mobile-fire {
            position: fixed; bottom: 40px; right: 40px;
            width: 80px; height: 80px; background: rgba(255,0,0,0.5);
            border-radius: 50%; display: none; z-index: 30;
        }
    </style>
</head>
<body>
    <div id="crosshair"></div>
    <div id="instructions">
        <div class="ui-hint">
            <h1>点击开始测试功能</h1>
            <p style="margin-top:10px; color:#aaa;">WASD: 移动 | 空格: 跳跃 | 左键: 射击</p>
            <p style="color: #0f0; font-weight: bold; margin-top: 15px;">若无法运行，请确保使用本地服务器(Live Server)打开</p>
        </div>
    </div>
    <div id="mobile-fire"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "cannon-es": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import * as CANNON from 'cannon-es';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- 1. 初始化物理与场景 ---
        const world = new CANNON.World({ gravity: new CANNON.Vec3(0, -9.82, 0) });
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        scene.add(camera); // 枪支绑定相机必须加这一行

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- 2. 武器类 (核心功能) ---
        class Weapon {
            constructor() {
                this.group = new THREE.Group();
                this.basePos = new THREE.Vector3(0.35, -0.3, -0.5);
                this.recoilZ = 0;
                this.bob = 0;

                // 枪身：明显的深色金属感
                const body = new THREE.Mesh(
                    new THREE.BoxGeometry(0.12, 0.18, 0.6),
                    new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.8 })
                );
                // 枪管：红色，方便辨认
                const barrel = new THREE.Mesh(
                    new THREE.BoxGeometry(0.06, 0.06, 0.4),
                    new THREE.MeshStandardMaterial({ color: 0xff0000 })
                );
                barrel.position.z = -0.4;
                this.group.add(body, barrel);
                
                // 枪口闪光灯
                this.flash = new THREE.PointLight(0xffaa00, 0, 5);
                this.flash.position.set(0, 0, -0.6);
                this.group.add(this.flash);

                camera.add(this.group);
                this.group.position.copy(this.basePos);
            }

            update(delta, isMoving) {
                // 移动时的动态晃动 (Bobbing)
                if (isMoving) {
                    this.bob += delta * 12;
                    this.group.position.y = this.basePos.y + Math.sin(this.bob) * 0.03;
                    this.group.position.x = this.basePos.x + Math.cos(this.bob * 0.5) * 0.02;
                } else {
                    this.group.position.lerp(this.basePos, 0.1);
                }

                // 后坐力平滑恢复
                this.recoilZ = THREE.MathUtils.lerp(this.recoilZ, 0, 0.15);
                this.group.position.z = this.basePos.z + this.recoilZ;

                // 闪光快速消失
                this.flash.intensity = Math.max(0, this.flash.intensity - delta * 100);
            }

            fire() {
                this.recoilZ = 0.15; // 后坐力位移
                this.flash.intensity = 15; // 开启火光
                
                // 射击射线检测
                const raycaster = new THREE.Raycaster();
                raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
                const hits = raycaster.intersectObjects(scene.children);
                
                if (hits.length > 1) { // 排除自己和地面
                    const hit = hits.find(h => h.object.name === "target");
                    if(hit) {
                        this.createImpact(hit.point);
                        // 简单的击退效果演示
                        hit.object.position.y += 0.1;
                    }
                }
            }

            createImpact(pos) {
                const spark = new THREE.Mesh(
                    new THREE.SphereGeometry(0.05),
                    new THREE.MeshBasicMaterial({ color: 0xffff00 })
                );
                spark.position.copy(pos);
                scene.add(spark);
                setTimeout(() => scene.remove(spark), 50);
            }
        }

        // --- 3. 环境建筑 ---
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(100, 100),
            new THREE.MeshStandardMaterial({ color: 0x333333 })
        );
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);
        
        const groundBody = new CANNON.Body({ mass: 0, shape: new CANNON.Plane() });
        groundBody.quaternion.setFromEuler(-Math.PI / 2, 0, 0);
        world.addBody(groundBody);

        // 目标方块
        const boxGeo = new THREE.BoxGeometry(2, 2, 2);
        for(let i=0; i<15; i++) {
            const box = new THREE.Mesh(boxGeo, new THREE.MeshStandardMaterial({ color: Math.random() * 0xffffff }));
            box.position.set(Math.random()*40-20, 1, Math.random()*40-20);
            box.name = "target";
            box.castShadow = true;
            scene.add(box);
        }

        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(10, 20, 10);
        light.castShadow = true;
        scene.add(light);

        // --- 4. 角色控制逻辑 ---
        const playerBody = new CANNON.Body({
            mass: 60, shape: new CANNON.Sphere(0.6), position: new CANNON.Vec3(0, 2, 0), fixedRotation: true
        });
        world.addBody(playerBody);

        const weapon = new Weapon();
        const controls = new PointerLockControls(camera, document.body);
        const inst = document.getElementById('instructions');

        inst.addEventListener('click', () => controls.lock());
        controls.addEventListener('lock', () => inst.style.display = 'none');
        controls.addEventListener('unlock', () => inst.style.display = 'flex');

        let keys = {};
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);
        window.addEventListener('mousedown', () => { if(controls.isLocked) weapon.fire(); });

        // --- 5. 循环渲染 ---
        const clock = new THREE.Clock();
        const moveDir = new THREE.Vector3();

        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1);

            if (controls.isLocked) {
                world.fixedStep();
                
                // 移动计算
                moveDir.set(0, 0, 0);
                if (keys['KeyW']) moveDir.z -= 1;
                if (keys['KeyS']) moveDir.z += 1;
                if (keys['KeyA']) moveDir.x -= 1;
                if (keys['KeyD']) moveDir.x += 1;

                const isMoving = moveDir.length() > 0;
                moveDir.normalize().multiplyScalar(10).applyQuaternion(camera.quaternion);

                playerBody.velocity.x = moveDir.x;
                playerBody.velocity.z = moveDir.z;
                if (keys['Space'] && Math.abs(playerBody.velocity.y) < 0.1) playerBody.velocity.y = 5;

                // 同步相机
                camera.position.set(playerBody.position.x, playerBody.position.y + 0.6, playerBody.position.z);
                
                // 更新武器动态
                weapon.update(delta, isMoving);
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
