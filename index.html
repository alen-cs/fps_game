<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPS Game</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: white; user-select: none; }
        /* 游戏 UI 样式 */
        #instructions { position: absolute; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background: rgba(0,0,0,0.7); cursor: pointer; z-index: 100;}
        #ui-layer { position: absolute; bottom: 20px; left: 20px; z-index: 10; font-family: monospace; font-size: 18px;}
        .bar-container { width: 250px; height: 15px; background: #222; border: 2px solid #555; margin-bottom: 10px;}
        .fill { height: 100%; transition: width 0.1s; }
        #health-fill { background: #ff3333; width: 100%; }
        #stamina-fill { background: #33cc33; width: 100%; }
        #damage-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; transition: box-shadow 0.2s; z-index: 50;}
        #wave-info { position: absolute; top: 20px; width: 100%; text-align: center; font-size: 24px; font-weight: bold; font-family: monospace; z-index: 10;}
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: rgba(255,255,255,0.8); font-size: 20px; pointer-events: none; z-index: 50;}
    </style>
</head>
<body>
    <div id="damage-overlay"></div>
    <div id="crosshair">十</div>
    <div id="wave-info">WAVE 1 - INCOMING...</div>
    
    <div id="ui-layer">
        <div>HP</div>
        <div class="bar-container"><div id="health-fill" class="fill"></div></div>
        <div>STAMINA</div>
        <div class="bar-container"><div id="stamina-fill" class="fill"></div></div>
    </div>

    <div id="instructions">
        <div style="text-align: center;">
            <h1 style="font-family: sans-serif;">CLICK TO START</h1>
            <p>WASD: Move | SHIFT: Sprint | SPACE: Jump | MOUSE: Shoot</p>
        </div>
    </div>

    <script type="module" src="./src/main.js"></script>
</body>
</html>
